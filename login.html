<!DOCTYPE html>
<html>
  <head>
    <title>Amazon - Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/pages/login.css">
  </head>
  <body>
    <div class="login-page">
      <a href="index.html">
        <img class="login-logo" src="images/amazon-logo.png" alt="Amazon">
      </a>

      <p class="js-success-message login-success"></p>

      <div class="login-container">
        <h1 class="login-title">Sign in</h1>

        <form class="js-login-form">
          <label class="login-label" for="email">Email</label>
          <input
            class="login-input js-email"
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          >

          <label class="login-label" for="password">Password</label>
          <input
            class="login-input js-password"
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          >

          <p class="js-error-message login-error"></p>

          <button class="button-primary login-button" type="submit">
            Sign in
          </button>
        </form>
      </div>

      <div class="login-divider">
        <span class="login-divider-text">New to Amazon?</span>
      </div>

      <div class="login-new-account">
        <a href="register.html" class="button-secondary login-button login-anchor-btn">
          Create your Amazon account
        </a>
      </div>
    </div>

    <script type="module" src="scripts/login.js"></script>
  </body>
</html>
